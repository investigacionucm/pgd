<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluador de coautoría · UCM</title>
<style>
:root{--ucm-red:#9B2226;--ucm-dark:#7B1A1E;--ucm-light:#C1666B;--gray:#f5f3f0;--border:#ddd8d0;--text:#1a1a1a;--muted:#666;--font-ui:system-ui,-apple-system,sans-serif;--font-serif:Georgia,'Times New Roman',serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-ui);background:#ede9e3;color:var(--text);min-height:100vh}
.site-header{background:var(--ucm-red);display:flex;align-items:stretch}
.header-logo{background:var(--ucm-dark);padding:14px 20px;display:flex;align-items:center;flex-shrink:0}
.header-logo img{height:52px;width:auto;filter:brightness(0) invert(1)}
.header-text{padding:14px 24px;display:flex;flex-direction:column;justify-content:center;border-left:1px solid rgba(255,255,255,.2)}
.header-text h1{font-family:var(--font-serif);font-size:17px;font-weight:700;color:#fff;letter-spacing:.03em;line-height:1.3}
.header-text p{font-size:12px;color:rgba(255,255,255,.75);margin-top:3px}
.container{max-width:720px;margin:0 auto;padding:28px 20px 60px}
.progress-wrap{margin-bottom:24px}
.progress-labels{display:flex;gap:4px;margin-bottom:7px}
.progress-label{flex:1;font-size:10px;color:var(--muted);text-align:center;line-height:1.3;transition:color .2s}
.progress-label.active{color:var(--ucm-red);font-weight:600}
.progress-label.done{color:var(--ucm-red)}
.progress-bar{display:flex;gap:4px}
.progress-seg{flex:1;height:5px;border-radius:3px;background:#ccc8c0;transition:background .3s}
.progress-seg.done{background:var(--ucm-red)}
.progress-seg.active{background:var(--ucm-light)}
.card{background:#fff;border-radius:4px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.09)}
.card-header{background:var(--ucm-red);padding:12px 20px;display:flex;align-items:center;gap:10px}
.step-num{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.25);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-header h2{font-family:var(--font-serif);font-size:15px;font-weight:700;color:#fff;letter-spacing:.04em;text-transform:uppercase}
.card-body{padding:24px 24px 20px}
.question-text{font-size:15px;font-weight:500;color:var(--text);line-height:1.6;margin-bottom:6px}
.question-hint{font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.55;padding:8px 12px;background:var(--gray);border-left:3px solid var(--ucm-light);border-radius:0 3px 3px 0}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.opt-btn{text-align:left;padding:11px 16px;font-size:13px;border-radius:3px;border:1px solid var(--border);background:#faf9f7;color:var(--text);cursor:pointer;transition:all .15s;line-height:1.45;font-family:var(--font-ui)}
.opt-btn:hover{border-color:var(--ucm-light);background:#fff5f5}
.opt-btn.selected{background:#f5e8e8;border-color:var(--ucm-red);color:var(--ucm-dark);font-weight:500}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:4px;padding-top:16px;border-top:1px solid var(--border)}
.btn{padding:9px 22px;border-radius:3px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text);transition:all .15s;letter-spacing:.02em;font-family:var(--font-ui)}
.btn:hover{background:var(--gray)}
.btn-primary{background:var(--ucm-red);color:#fff;border-color:var(--ucm-red)}
.btn-primary:hover{background:var(--ucm-dark);border-color:var(--ucm-dark)}
.btn-ghost{visibility:hidden}
.step-counter{font-size:12px;color:var(--muted)}

/* Resultados */
.result-card{background:#fff;border-radius:4px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.09);margin-bottom:16px}
.result-header{padding:14px 20px;display:flex;align-items:center;gap:12px}
.result-header.green{background:#1a6b3a}
.result-header.amber{background:#7a4f00}
.result-header.red{background:#8b1a1a}
.result-header.gray{background:#4a4640}
.result-icon{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;color:#fff}
.result-header-text h2{font-family:var(--font-serif);font-size:15px;color:#fff;letter-spacing:.03em}
.result-header-text p{font-size:11px;color:rgba(255,255,255,.8);margin-top:2px}
.result-body{padding:20px 24px}
.result-main{font-size:14px;line-height:1.65;color:var(--text);margin-bottom:16px}
.alert-box{padding:11px 14px;border-radius:3px;font-size:13px;line-height:1.55;margin-bottom:14px}
.alert-danger{background:#fdf0f0;border-left:3px solid var(--ucm-red);color:#6b1a1a}
.alert-warning{background:#fdf7e8;border-left:3px solid #b07c00;color:#5a3e00}
.alert-info{background:#f0f4fd;border-left:3px solid #3b5eb0;color:#1e3060}
.alert-success{background:#f0faf4;border-left:3px solid #1a6b3a;color:#0f3d22}
.section-title{font-family:var(--font-serif);font-size:13px;font-weight:700;color:var(--ucm-red);text-transform:uppercase;letter-spacing:.05em;margin:18px 0 10px;border-bottom:1px solid var(--border);padding-bottom:6px}
.rec-list{list-style:none;padding:0;margin:0}
.rec-list li{font-size:13px;line-height:1.6;color:var(--text);padding:5px 0 5px 18px;position:relative;border-bottom:1px solid #f0ede8}
.rec-list li:last-child{border-bottom:none}
.rec-list li::before{content:"›";position:absolute;left:4px;color:var(--ucm-red);font-weight:700}
.criteria-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.crit-item{padding:9px 12px;border-radius:3px;font-size:12px;line-height:1.45;border:1px solid}
.crit-yes{background:#f0faf4;border-color:#5dcaa5;color:#0f3d22}
.crit-no{background:var(--gray);border-color:#ccc8c0;color:var(--muted)}
.crit-label{font-weight:600;display:block;margin-bottom:2px}
.ref-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;border:1px solid var(--border);color:var(--muted);margin:2px 2px 0 0}
.restart-row{text-align:center;margin-top:8px}
.divider{height:1px;background:var(--border);margin:18px 0}
@media(max-width:600px){.criteria-grid{grid-template-columns:1fr}}
</style>
</head>

    hint: 'Esta pregunta ayuda a identificar posibles irregularidades en el proceso de atribución de autoría, que están explícitamente tratadas en el Código UCM (§4.1) y en las recomendaciones de COPE e ICMJE.',

      { label: 'Participo activamente en la investigación y quiero saber cómo debe constar mi contribución', val: 'normal' },

const answers = {};

function isAuthorCandidate() {
  return answers.design === 'yes' && answers.writing === 'yes';
}

function getVisibleQuestions() {
  if (answers.context && answers.context !== 'normal' && answers.context !== 'gift_suspect') {
    return [Q[0]];
  }
  const base = Q.filter(q => {
    if (!q.conditional) return true;
    return q.showWhen();
  });
  return base;
}

function computeResult() {
  const ctx = answers.context;
  if (ctx === 'coercive') return { type: 'malpractice', sub: 'coercive' };
  if (ctx === 'ghost_suspect') return { type: 'malpractice', sub: 'ghost' };

  if (ctx === 'gift_suspect') {
    if (answers.design !== 'yes' || answers.writing !== 'yes') {
      return { type: 'gift_confirmed' };
    }
  }

  const a = answers.design === 'yes';
  const b = answers.writing === 'yes';
  const c = answers.approval === 'yes';
  const d = answers.accountability === 'yes' || answers.accountability === 'partial';

  if (a && b && c && d) return { type: 'author', criteria: { a, b, c, d } };
  if (a && b && !c) return { type: 'incomplete' };

  const ct = answers.contrib_type;
  if (ct === 'none') return { type: 'none' };
  if (ct) return { type: 'ack', contrib: ct };

  return { type: 'ack_likely' };
}

let currentStep = 0;
let showResult = false;

function getStepIndex() {
  const qs = getVisibleQuestions();
  return Math.min(currentStep, qs.length - 1);
}

function renderProgress(total, current) {
  const labels = document.getElementById('pLabels');
  const bar = document.getElementById('pBar');
  if (!labels || !bar) return;

  const stepNames = getVisibleQuestions().map(q => q.stepLabel).concat(['Resultado']);
  labels.innerHTML = stepNames.map((n, i) => {
    let cls = 'progress-label';
    if (showResult && i === stepNames.length - 1) cls += ' active';
    else if (!showResult && i === current) cls += ' active';
    else if (i < current || showResult) cls += ' done';
    return `<div class="${cls}">${n}</div>`;
  }).join('');

  bar.innerHTML = stepNames.map((_, i) => {
    let cls = 'progress-seg';
    if (showResult && i === stepNames.length - 1) cls += ' active';
    else if (!showResult && i === current) cls += ' active';
    else if (i < current || showResult) cls += ' done';
    return `<div class="${cls}"></div>`;
  }).join('');
}

function renderQuestion(q, idx, total) {
  const sel = answers[q.id];
  renderProgress(total + 1, idx);
  const app = document.getElementById('app');
  let html = `<div class="card">
    <div class="card-header">
      <div class="step-num">${idx + 1}</div>
      <div>
        <h2>${q.header}</h2>
        <div style="font-size:11px;color:rgba(255,255,255,.75);margin-top:2px">${q.headerSub}</div>
      </div>
    </div>
    <div class="card-body">
      <p class="question-text">${q.text}</p>
      ${q.hint ? `<div class="question-hint">${q.hint}</div>` : ''}
      <div class="options">
        ${q.opts.map(o => `<button class="opt-btn${sel === o.val ? ' selected' : ''}" onclick="selectOpt('${q.id}','${o.val}')">${o.label}</button>`).join('')}
      </div>
      <div class="nav-row">
        ${idx > 0 ? `<button class="btn" onclick="goBack()">← Anterior</button>` : `<span></span>`}
        <span class="step-counter">Pregunta ${idx + 1} de ${total}</span>
        ${sel ? `<button class="btn btn-primary" onclick="goNext()">Siguiente →</button>` : `<button class="btn btn-primary" disabled style="opacity:.4;cursor:default">Siguiente →</button>`}
      </div>
    </div>
  </div>`;
  app.innerHTML = html;
}

function renderResultHTML() {
  const res = computeResult();
  const a = answers;

  const MALPRACTICE = {
    coercive: {
      color: 'red', icon: '!',
      title: 'Presión para incluir autoría no justificada',
      sub: 'Práctica prohibida — autoría coercitiva',
      main: 'El Código UCM de Buenas Prácticas en Investigación (§4.1 y Anexo III) y las recomendaciones de COPE prohíben explícitamente presionar a otros investigadores para que incluyan a alguien como autor sin que haya realizado contribuciones que cumplan los criterios establecidos. Esta conducta constituye una forma de mala práctica científica.',
      alert: { type: 'danger', text: 'Debes comunicar esta situación al <strong>Comité de Ética de la Investigación (CEI) de la UCM</strong> o a la <strong>Inspección de Servicios</strong>. El Código UCM (§4.1) establece expresamente que en caso de detectar malas prácticas en relación con estas directrices, debe informarse al CEI.' },
      refs: ['Código UCM BBPP Investigación §4.1', 'Código UCM BBPP Investigación, Anexo III', 'COPE: Coercive authorship']
    },
    ghost: {
      color: 'red', icon: '!',
      title: 'Posible exclusión de autoría legítima',
      sub: 'Práctica prohibida — autoría fantasma',
      main: 'El Código UCM (Anexo III) establece con claridad que ninguna persona que cumpla los criterios de autoría puede ser excluida. Excluir a quien ha contribuido sustancialmente al trabajo constituye una forma de "autoría fantasma" (ghost authorship), práctica expresamente prohibida por el ICMJE y COPE.',
      alert: { type: 'danger', text: 'Comunica la situación al autor/a de correspondencia o al responsable del grupo. Si no se resuelve, puedes acudir al <strong>Comité de Ética de la Investigación (CEI) de la UCM</strong> o a la <strong>Inspección de Servicios</strong>.' },
      refs: ['Código UCM BBPP Investigación Anexo III', 'ICMJE: Defining the Role of Authors §II.A', 'COPE: Ghost authorship']
    }
  };

  if (res.type === 'malpractice') {
    const m = MALPRACTICE[res.sub];
    return buildResultCard(m.color, m.icon, m.title, m.sub, m.main, m.alert, [], m.refs);
  }

  if (res.type === 'gift_confirmed') {
    return buildResultCard('red', '!',
      'La propuesta de autoría no está justificada',
      'Práctica prohibida — autoría honorífica',
      'Has indicado que se te ha propuesto figurar como autor/a, y tus respuestas indican que no cumples los criterios necesarios para ello. El Código UCM (§4.1) prohíbe expresamente la autoría honorífica o "regalo" (gift authorship): incluir a alguien sin que haya contribuido sustancialmente vulnera los principios de integridad científica de la UCM, ICMJE y COPE.',
      { type: 'warning', text: 'Lo correcto es no aceptar la autoría. Si has realizado alguna contribución al trabajo, puedes y debes aparecer en la sección de <strong>agradecimientos</strong>. Informa al equipo de esta situación.' },
      [], ['Código UCM BBPP Investigación §4.1 y Anexo III', 'COPE: Gift authorship', 'ICMJE: Defining the Role of Authors']);
  }

  if (res.type === 'author') {
    const orderMsg = {
      agreed: null,
      informal: { type: 'warning', text: 'El acuerdo sobre el orden de autoría debe formalizarse <strong>por escrito</strong> antes del envío del manuscrito. El Código UCM §4.1 es explícito en este punto.' },
      pending: { type: 'warning', text: 'El orden de autoría no se ha acordado aún. El Código UCM §4.1 exige acordarlo antes de redactar y dejarlo por escrito. Hazlo cuanto antes.' },
      na: null
    }[a.order];

    const criteriaGrid = `<div class="criteria-grid">
      <div class="crit-item crit-yes"><span class="crit-label">a) Contribución sustancial</span>Diseño, recogida de datos, análisis o interpretación</div>
      <div class="crit-item crit-yes"><span class="crit-label">b) Redacción / revisión crítica</span>Participación sustancial en el manuscrito</div>
      <div class="crit-item ${res.criteria.c ? 'crit-yes' : 'crit-no'}"><span class="crit-label">c) Aprobación de la versión final</span>${res.criteria.c ? 'Criterio cumplido' : 'Pendiente de cumplir'}</div>
      <div class="crit-item ${res.criteria.d ? 'crit-yes' : 'crit-no'}"><span class="crit-label">d) Responsabilidad pública</span>${res.criteria.d ? 'Asumida' : 'No asumida plenamente'}</div>
    </div>`;

    const recs = [
      'Indica tu filiación completa: <strong>Universidad Complutense de Madrid</strong>, facultad, departamento y, si procede, el instituto o centro de investigación al que estás adscrito/a.',
      'Declara cualquier conflicto de interés actual o potencial en el artículo, tal como exige el Código UCM §4.1.',
      'La lista de autores y sus posibles modificaciones deben ser <strong>aprobadas por escrito</strong> por todos los autores antes del envío.',
      'Cita todas las fuentes y referencias utilizadas para que el trabajo de otros investigadores reciba el reconocimiento debido.',
      'Deposita la publicación en el <a href="https://docta.ucm.es" target="_blank" style="color:var(--ucm-red)">repositorio DOCTA de la UCM</a> en un plazo máximo de <strong>12 meses</strong> desde su publicación, conforme a la política de acceso abierto de la UCM (2014).',
      'No envíes el manuscrito a más de una revista simultáneamente sin conocimiento y acuerdo de los editores implicados.'
    ];

    const orderRecs = [
      '<strong>Primer autor/a:</strong> quien haya realizado la mayor contribución intelectual o sea el/la ejecutor/a principal. En el caso de tesis doctorales, habitualmente corresponde al doctorando/a cuando es el ejecutor central de la investigación.',
      '<strong>Autores/as intermedios/as:</strong> por nivel decreciente de aportación. Si se usa otro criterio (p. ej., orden alfabético), debe indicarse explícitamente en la publicación.',
      '<strong>Último/a autor/a:</strong> convención para el IP o investigador/a sénior con rol supervisor, habitual en ciencias experimentales y biomedicina (no universal en todas las disciplinas).',
      'Si el criterio de orden no refleja la importancia de las contribuciones, el Código UCM Anexo III exige indicarlo expresamente en el artículo.'
    ];

    let html = `<div class="result-card">
      <div class="result-header green">
        <div class="result-icon" style="font-size:18px">✓</div>
        <div class="result-header-text"><h2>Debes figurar como autor/a</h2><p>Autoría completa — Código UCM Anexo III / ICMJE</p></div>
      </div>
      <div class="result-body">
        <p class="result-main">Cumples los cuatro criterios acumulativos del Código UCM (Anexo III) y las recomendaciones ICMJE/COPE. No incluirte en la lista de autores constituiría una práctica prohibida (autoría fantasma).</p>
        <div class="section-title">Criterios cumplidos</div>
        ${criteriaGrid}
        ${orderMsg ? `<div class="alert-box alert-${orderMsg.type}" style="margin-top:12px">${orderMsg.text}</div>` : ''}
        <div class="section-title">Recomendaciones para autores — Código UCM §4.1</div>
        <ul class="rec-list">${recs.map(r => `<li>${r}</li>`).join('')}</ul>
        <div class="section-title">Sobre el orden de autoría</div>
        <ul class="rec-list">${orderRecs.map(r => `<li>${r}</li>`).join('')}</ul>
        <div class="divider"></div>
        <div style="font-size:11px;color:var(--muted)">Referencias: ${['Código UCM BBPP Investigación §4.1', 'Código UCM BBPP Investigación, Anexo III', 'ICMJE Recommendations 2022', 'COPE Discussion Document: Authorship', 'CRediT NISO Z39.104-2022'].map(r => `<span class="ref-tag">${r}</span>`).join('')}</div>
      </div>
    </div>`;
    return html;
  }

  if (res.type === 'incomplete') {
    return buildResultCard('amber', '~',
      'Autoría potencialmente incompleta',
      'Criterio c) no satisfecho — aprobación final pendiente',
      'Cumples los criterios a) y b), pero el criterio c) —aprobación de la versión final— es obligatorio para todos los autores según el Código UCM (Anexo III) e ICMJE. Si no te han dado la oportunidad de revisar y aprobar la versión definitiva antes del envío, existe un problema procedimental en el equipo.',
      { type: 'warning', text: 'Solicita al autor/a de correspondencia que te envíe la versión final para revisión y aprobación antes del envío. El Código UCM Anexo III es claro: la lista de autores y su aprobación deben constar por escrito.' },
      ['Solicitar al equipo la versión final antes del envío.', 'Una vez aprobada, tu autoría será válida si también asumes la responsabilidad del criterio d).', 'En caso de no recibir respuesta, puedes consultar al Comité de Ética de la Investigación de la UCM.'],
      ['Código UCM BBPP Investigación Anexo III', 'ICMJE Recommendations 2022 §II.A.3']);
  }

  if (res.type === 'ack' || res.type === 'ack_likely') {
    const labels = { tech: 'apoyo técnico o de laboratorio', funding: 'aportación de financiación o recursos', editing: 'revisión de idioma o edición no sustancial', supervision: 'supervisión sin contribución intelectual directa' };
    const cl = labels[res.contrib] || 'contribución sin alcance de autoría';
    return buildResultCard('amber', '~',
      'Tu participación debe constar en agradecimientos',
      'Contribución reconocida — sin alcance de autoría',
      `No cumples todos los criterios para figurar como autor/a, pero tu contribución (${cl}) merece reconocimiento. El Código UCM (Anexo III) y el ICMJE establecen que todas las personas que hayan colaborado sin cumplir los criterios de autoría deben aparecer en la sección de <strong>agradecimientos</strong>, siempre con su consentimiento.`,
      { type: 'info', text: 'El reconocimiento en agradecimientos requiere tu consentimiento explícito. Confirma que el texto que describe tu contribución es exacto antes de que se envíe el manuscrito.' },
      ['Comunica al equipo si deseas —o no— aparecer en la sección de agradecimientos.', 'Asegúrate de que el texto que describe tu contribución es exacto y no te atribuye una participación mayor o menor de la real.', 'Si aportaste financiación de una entidad externa, verifica que la fuente quede correctamente identificada en el apartado de financiación del artículo.'],
      ['Código UCM BBPP Investigación §4.1 y Anexo III', 'ICMJE: Non-author Contributors', 'COPE Discussion Document: Authorship']);
  }

  if (res.type === 'none') {
    return buildResultCard('gray', '—',
      'No procede ninguna mención en el trabajo',
      'Sin contribución relevante identificada',
      'No has descrito contribuciones que justifiquen ni autoría ni agradecimientos. No debes figurar en el trabajo.',
      null, [], []);
  }

  return '<p>Error en el flujo.</p>';
}

function buildResultCard(color, icon, title, sub, main, alert, recs, refs) {
  let html = `<div class="result-card">
    <div class="result-header ${color}">
      <div class="result-icon">${icon}</div>
      <div class="result-header-text"><h2>${title}</h2><p>${sub}</p></div>
    </div>
    <div class="result-body">
      <p class="result-main">${main}</p>`;
  if (alert) html += `<div class="alert-box alert-${alert.type}">${alert.text}</div>`;
  if (recs && recs.length) {
    html += `<div class="section-title">Qué debes hacer</div><ul class="rec-list">${recs.map(r => `<li>${r}</li>`).join('')}</ul>`;
  }
  if (refs && refs.length) {
    html += `<div class="divider"></div><div style="font-size:11px;color:var(--muted)">Referencias: ${refs.map(r => `<span class="ref-tag">${r}</span>`).join('')}</div>`;
  }
  html += `</div></div>`;
  return html;
}

function selectOpt(qid, val) {
  answers[qid] = val;
  render();
}

function goNext() {
  const qs = getVisibleQuestions();
  const malpractice = answers.context && ['coercive', 'ghost_suspect'].includes(answers.context);
  const giftConfirmed = answers.context === 'gift_suspect' && answers.design && answers.writing && (answers.design !== 'yes' || answers.writing !== 'yes');

  if (malpractice || giftConfirmed) {
    showResult = true;
    render();
    return;
  }

  if (currentStep < qs.length - 1) {
    currentStep++;
    render();
  } else {
    showResult = true;
    render();
  }
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    render();
  }
}

function restart() {
  Object.keys(answers).forEach(k => delete answers[k]);
  currentStep = 0;
  showResult = false;
  render();
}

function render() {
  const app = document.getElementById('app');
  if (showResult) {
    renderProgress(0, 0);
    const qs = getVisibleQuestions();
    const lbl = document.getElementById('pLabels');
    if (lbl) {
      const names = qs.map(q => q.stepLabel).concat(['Resultado']);
      lbl.innerHTML = names.map((n, i) => `<div class="progress-label${i === names.length - 1 ? ' active' : ' done'}">${n}</div>`).join('');
      const bar = document.getElementById('pBar');
      if (bar) bar.innerHTML = names.map((_, i) => `<div class="progress-seg${i === names.length - 1 ? ' active' : ' done'}"></div>`).join('');
    }
    app.innerHTML = renderResultHTML() + `<div class="restart-row"><button class="btn" onclick="restart()">← Realizar una nueva evaluación</button></div>`;
    return;
  }
  const qs = getVisibleQuestions();
  if (currentStep >= qs.length) { showResult = true; render(); return; }
  const q = qs[currentStep];

  const malpractice = answers.context && ['coercive', 'ghost_suspect'].includes(answers.context);
  if (malpractice && currentStep > 0) { showResult = true; render(); return; }

  renderQuestion(q, currentStep, qs.length);
}

render();
</script>
</body>
</html>
